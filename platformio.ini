[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Use the "huge_app" partition layout (3 MB app, no OTA slot).
; The default layout only allows 1.31 MB, which the WiFi+HTTP+ArduinoJson
; stack pushed past once the game store was added.
board_build.partitions = huge_app.csv

; Upload speed and monitor speed
upload_speed = 921600
monitor_speed = 115200

; Dependencies
lib_deps =
    lvgl/lvgl @ ^8.3.0
    bodmer/TFT_eSPI @ ^2.5.43
    XPT2046_Touchscreen
    SD
    bblanchon/ArduinoJson @ ^7.0.4

; Include path so LVGL (in libdeps) finds our lv_conf.h.
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -std=gnu++17